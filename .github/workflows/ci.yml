name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs of the same workflow on the same branch / PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimum permissions: read repo contents and packages (for codecov).
permissions:
  contents: read

jobs:
  lint-typecheck-test-bundle:
    name: Lint, typecheck, test, bundle (${{ matrix.os }} / node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }} on ${{ matrix.os }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Bundle
        run: npm run bundle

      - name: Smoke (require bundled CJS)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Sanity-check that the bundle produced by ncc is loadable as a CJS module.
          # We don't try to RUN the action (it would need GITHUB_REPOSITORY etc.)
          # — we only verify the module graph resolves without throwing on load.
          node -e "require('./dist/index.js')" 2>&1 | tee smoke.log
          # The bundle calls github.context.repo on load and will fail with
          # 'context.repo requires a GITHUB_REPOSITORY…' — that IS the expected
          # error. The test is: we did not crash with a SyntaxError or a
          # 'Cannot find module' before reaching the action body.
          if grep -qiE 'syntaxerror|cannot find module' smoke.log; then
            echo "::error::Bundle failed to load cleanly:"
            cat smoke.log
            exit 1
          fi
          echo "Bundle loaded (expected GITHUB_REPOSITORY error is fine)."

      - name: Upload coverage (Linux + Node 22 only)
        if: matrix.os == 'ubuntu-latest' && matrix.node == '22'
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.node == '22'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: false

  dist-sync:
    name: dist/ is in sync with src/
    runs-on: ubuntu-latest
    needs: lint-typecheck-test-bundle
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # We need the un-committed state of dist/ if any, plus the committed
          # version, to do a real diff.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild dist/
        run: npm run bundle

      - name: Verify dist/ matches committed version
        # If any of the files in dist/ differ from what is in the PR, fail.
        # This protects `uses: wardsvelds2l/pr-summary@v0` consumers from
        # accidentally pulling a stale bundle.
        run: |
          if git diff --exit-code -- dist/; then
            echo "dist/ is in sync with src/ — OK"
          else
            echo "::error::dist/ is out of sync with src/."
            echo "::error::A contributor modified src/ without rebuilding dist/."
            echo "::error::Run \`npm run bundle\` locally, then \`git add dist && git commit -m 'chore: rebuild dist'\`."
            git diff -- dist/ | head -200
            exit 1
          fi
