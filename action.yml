name: 'PR Summary'
description: 'Posts a single, AI-generated summary of a pull request diff as an idempotent comment. Works with any OpenAI-compatible API (OpenAI, Azure, Groq, OpenRouter, Anthropic via proxy, local LLMs).'
author: 'wardsvelds2l'
branding:
  icon: 'message-square'
  color: 'blue'

inputs:
  github-token:
    description: 'GitHub token used to read the diff and post the comment. Defaults to the workflow-provided GITHUB_TOKEN.'
    required: true
    default: ${{ github.token }}
  openai-api-key:
    description: 'API key for an OpenAI-compatible LLM endpoint. Required.'
    required: true
  openai-base-url:
    description: 'Base URL for the OpenAI-compatible API. Defaults to https://api.openai.com/v1. Compatible with OpenAI, Azure OpenAI, Groq, OpenRouter, Together, Ollama, LM Studio, llama.cpp and any other server speaking the /v1/chat/completions protocol.'
    required: false
    default: 'https://api.openai.com/v1'
  model:
    description: 'Model name passed to the LLM. Defaults to gpt-4o-mini. Use the exact model id the provider expects (e.g. gpt-4o-mini, claude-3-5-sonnet-latest via proxy, llama3.1).'
    required: false
    default: 'gpt-4o-mini'
  max-diff-chars:
    description: 'If the unified diff exceeds this many characters, the action splits it by file, runs a per-file summary, then a meta-summary over the per-file lines. Lower this to reduce prompt size / cost on small-context models.'
    required: false
    default: '120000'
  summary-style:
    description: 'Summary style. "detailed" produces sections (Summary, What changed, Why, Risks, Test plan); "brief" produces exactly 3 bullet points.'
    required: false
    default: 'detailed'
  language:
    description: 'BCP-47 language code for the generated comment. Supported: en, ru, ja, zh, es, fr, de, pt, ko, it, tr, ar, hi, pl, uk. Unknown codes fall back to English.'
    required: false
    default: 'en'
  trigger-event:
    description: 'When to run. "opened" runs only on opened/reopened; "all" also runs on synchronize (every push).'
    required: false
    default: 'all'

outputs:
  comment-id:
    description: 'Numeric ID of the posted or updated bot comment.'
  summary-length:
    description: 'Character length of the generated summary (excluding the bot marker).'

runs:
  using: 'node20'
  main: 'dist/index.js'

# Minimal copy-paste example. Drop this into .github/workflows/pr-summary.yml
# in your repository, add an OPENAI_API_KEY secret, and the action will post
# (and update on every push) a single summary comment.
example: |
  name: PR Summary
  on:
    pull_request:
      types: [opened, reopened, synchronize]
  permissions:
    contents: read
    pull-requests: write
  jobs:
    summary:
      runs-on: ubuntu-latest
      steps:
        - uses: wardsvelds2l/pr-summary@v0
          with:
            github-token: ${{ secrets.GITHUB_TOKEN }}
            openai-api-key: ${{ secrets.OPENAI_API_KEY }}
