# Multilingual PR summaries.
# Two parallel jobs post the summary in different languages. Both comments
# are idempotent — re-running the workflow just updates them in place.
name: PR Summary (multilingual)
on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  summary-en:
    name: Summary (English)
    runs-on: ubuntu-latest
    steps:
      - uses: wardsvelds2l/pr-summary@v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          language: en

  summary-ru:
    name: Summary (Russian)
    runs-on: ubuntu-latest
    steps:
      - uses: wardsvelds2l/pr-summary@v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          language: ru

  summary-ja:
    name: Summary (Japanese)
    runs-on: ubuntu-latest
    steps:
      - uses: wardsvelds2l/pr-summary@v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          language: ja
